version: '3.8'

x-common:
  database:
    &db-environment
    MYSQL_PASSWORD: &db-password "pterodactyl123"
    MYSQL_ROOT_PASSWORD: "pterodactyl123"
    MYSQL_DATABASE: "panel"
    MYSQL_USER: "pterodactyl"
  
  panel:
    &panel-environment
    APP_URL: "http://localhost"
    APP_TIMEZONE: "Asia/Jakarta"
    APP_SERVICE_AUTHOR: "noreply@pterodactyl.local"
    TRUSTED_PROXIES: "*"
    APP_DEBUG: "false"
    APP_ENV: "production"

services:
  database:
    image: mariadb:10.5-alpine
    container_name: pterodactyl_db
    restart: always
    command: --default-authentication-plugin=mysql_native_password --innodb-buffer-pool-size=256M
    volumes:
      - pterodactyl_db:/var/lib/mysql
    environment:
      <<: *db-environment
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1"]
      interval: 10s
      timeout: 5s
      retries: 3

  cache:
    image: redis:7-alpine
    container_name: pterodactyl_cache
    restart: always
    command: redis-server --appendonly yes --maxmemory 256m --maxmemory-policy allkeys-lru
    volumes:
      - pterodactyl_cache:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  panel:
    image: ghcr.io/pterodactyl/panel:latest
    container_name: pterodactyl_panel
    restart: always
    depends_on:
      database:
        condition: service_healthy
      cache:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - pterodactyl_var:/app/var/
      - pterodactyl_nginx:/etc/nginx/http.d/
      - pterodactyl_certs:/etc/letsencrypt/
      - pterodactyl_logs:/app/storage/logs
    environment:
      <<: *panel-environment
      DB_HOST: "database"
      DB_PORT: "3306"
      DB_PASSWORD: *db-password
      APP_ENVIRONMENT_ONLY: "false"
      CACHE_DRIVER: "redis"
      SESSION_DRIVER: "redis"
      QUEUE_DRIVER: "redis"
      REDIS_HOST: "cache"
      REDIS_PORT: "6379"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/application/servers"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  pterodactyl_db:
    driver: local
  pterodactyl_cache:
    driver: local
  pterodactyl_var:
    driver: local
  pterodactyl_nginx:
    driver: local
  pterodactyl_certs:
    driver: local
  pterodactyl_logs:
    driver: local

networks:
  default:
    name: pterodactyl_network
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
